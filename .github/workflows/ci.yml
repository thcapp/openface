name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

  quality-faces:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build bundle for capture
        run: bun run build

      - name: Run face manifest + matrix checks
        run: bun run qa:faces

      - name: Capture face matrix artifacts
        run: bun run qa:faces:capture

      - name: Upload face QA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: face-qa-artifacts
          path: |
            docs/remediation/face-qa-matrix-auto-*.md
            docs/remediation/artifacts/face-matrix-*/
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    needs: [test, quality-faces]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web component
        run: bun run build

      - name: Check bundle size
        run: |
          SIZE=$(wc -c < site/open-face.js)
          echo "Bundle size: ${SIZE} bytes ($(( SIZE / 1024 ))KB)"
          if [ "$SIZE" -gt 65536 ]; then
            echo "::warning::Bundle exceeds 64KB target"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-face-site
          path: |
            site/open-face.js
            site/faces/
